<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Workspace</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='56' font-size='56'>Σ</text></svg>">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ═══════════════════════ INLINE AUTH HELPERS (no dependency) ═══════════════════════ -->
<script>
window._authMode = 'signin';
function switchAuthMode(mode) {
  window._authMode = mode;
  var isSignup = mode === 'signup';
  // Tabs
  document.querySelectorAll('.auth-tab').forEach(function(t) { t.classList.remove('active'); });
  var tabEl = document.getElementById(isSignup ? 'authTabSignUp' : 'authTabSignIn');
  if (tabEl) tabEl.classList.add('active');
  // Title
  var titleEl = document.getElementById('authTitle');
  if (titleEl) titleEl.textContent = isSignup ? '创建账号' : '登录';
  // Button
  var btn = document.getElementById('authSubmitBtn');
  if (btn) {
    btn.textContent = isSignup ? '注册' : '登录';
    btn.onclick = isSignup
      ? function() { if (window.handleSignUp) window.handleSignUp(); }
      : function() { if (window.handleSignIn) window.handleSignIn(); };
  }
  // Role selector
  var roleGroup = document.getElementById('authRoleGroup');
  if (roleGroup) roleGroup.style.display = isSignup ? 'block' : 'none';
  // Confirm password
  var confirmWrap = document.getElementById('authPasswordConfirmWrap');
  if (confirmWrap) confirmWrap.style.display = isSignup ? 'block' : 'none';
  // Password toggle icons
  document.querySelectorAll('.pwd-toggle').forEach(function(icon) {
    icon.style.display = isSignup ? 'block' : 'none';
  });
  // Switch text
  var swEl = document.getElementById('authSwitchText');
  if (swEl) {
    swEl.innerHTML = isSignup
      ? '已有账号？<span class="auth-switch-link" onclick="switchAuthMode(\'signin\')">去登录</span>'
      : '没有账号？<span class="auth-switch-link" onclick="switchAuthMode(\'signup\')">去注册</span>';
  }
  // Clear messages
  var errEl = document.getElementById('authError');
  var msgEl = document.getElementById('authMessage');
  if (errEl) errEl.textContent = '';
  if (msgEl) msgEl.textContent = '';
}
function setPwdVisible(show) {
  var pw = document.getElementById('authPassword');
  var pc = document.getElementById('authPasswordConfirm');
  if (pw) pw.type = show ? 'text' : 'password';
  if (pc) pc.type = show ? 'text' : 'password';
}
// Init: bind the submit button after DOM is ready
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('authSubmitBtn');
  if (btn) btn.onclick = function() { if (window.handleSignIn) window.handleSignIn(); };
});
</script>

<!-- ═══════════════════════ AUTH CONTAINER ═══════════════════════ -->
<div id="authContainer" class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">Σ</div>
      <div>
        <div class="auth-logo-title">ResearchCopilot</div>
        <div class="auth-logo-sub">会计学研究助手</div>
      </div>
    </div>
    <div class="auth-tabs">
      <span class="auth-tab active" id="authTabSignIn" onclick="switchAuthMode('signin')">登录</span>
      <span class="auth-tab" id="authTabSignUp" onclick="switchAuthMode('signup')">注册</span>
    </div>
    <div class="auth-title" id="authTitle">登录</div>
    <div class="auth-error" id="authError"></div>
    <div class="auth-message" id="authMessage"></div>
    <input type="email" id="authEmail" placeholder="邮箱地址" autocomplete="email">
    <div class="auth-input-wrap">
      <input type="password" id="authPassword" placeholder="密码" autocomplete="current-password">
      <span class="pwd-toggle" id="pwdToggle" style="display:none"
        onmouseenter="setPwdVisible(true)" onmouseleave="setPwdVisible(false)">&#128065;</span>
    </div>
    <div class="auth-input-wrap" id="authPasswordConfirmWrap" style="display:none">
      <input type="password" id="authPasswordConfirm" placeholder="确认密码" autocomplete="new-password">
      <span class="pwd-toggle" style="display:none"
        onmouseenter="setPwdVisible(true)" onmouseleave="setPwdVisible(false)">&#128065;</span>
    </div>
    <div id="authRoleGroup" style="display:none;margin-bottom:12px">
      <label style="font-size:12px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:4px">用户类型</label>
      <select id="authRole" style="width:100%;height:40px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 12px;font-size:14px;font-family:var(--font);outline:none;background:var(--surface);box-sizing:border-box">
        <option value="researcher">Researcher</option>
        <option value="group_leader">Group Leader</option>
        <option value="co_investigator">Co-Investigator</option>
        <option value="principal_investigator">Principal Investigator</option>
      </select>
    </div>
    <button class="auth-submit" id="authSubmitBtn">登录</button>
    <div class="auth-switch" id="authSwitchText">
      没有账号？<span class="auth-switch-link" onclick="switchAuthMode('signup')">去注册</span>
    </div>
  </div>
</div>

<!-- ═══════════════════════ APP CONTENT ═══════════════════════ -->
<div id="appContent" style="display:none;flex-direction:column;height:100vh">

<!-- ═══════════════════════ HEADER ═══════════════════════ -->
<header>
  <div class="header-logo">
    <div class="logo-icon">Σ</div>
    <div>
      <div style="font-weight:700;font-size:15px;line-height:1.2;color:var(--accent)">ResearchCopilot</div>
      <div style="font-size:11px;color:var(--text-tertiary)">会计学研究助手</div>
    </div>
  </div>
  <div class="header-search">
    <span class="search-icon">&#9906;</span>
    <input type="text" id="searchInput" placeholder="输入研究问题，如：ESG 对成本粘性的影响...">
  </div>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="handleNewResearch()">+ 新建研究</button>
    <button class="btn" onclick="handleSearch()">&#128269; 搜索</button>
    <span id="userEmail" style="font-size:12px;color:var(--text-tertiary);margin-left:8px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    <button class="btn" onclick="handleSignOut()" title="退出登录" style="padding:0 8px;font-size:16px">&#10149;</button>
  </div>
</header>

<!-- ═══════════════════════ MAIN ═══════════════════════ -->
<main>
  <!-- ─── SIDEBAR ─── -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">研究主题</div>
      <div id="topicList"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">最近研究</div>
      <div id="recentList"></div>
    </div>
  </aside>

  <!-- ─── CENTER ─── -->
  <section class="center" id="centerArea"></section>

  <!-- ─── RIGHT PANEL ─── -->
  <aside class="right-panel" id="rightPanel"></aside>
</main>

</div><!-- /appContent -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<script src="js/data.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
