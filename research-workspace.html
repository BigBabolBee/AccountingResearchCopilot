<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Workspace</title>
<style>
:root {
  --bg: #fafafa;
  --surface: #ffffff;
  --border: #e8e8e8;
  --text: #1a1a1a;
  --text-secondary: #6b6b6b;
  --text-tertiary: #9b9b9b;
  --accent: #2f2f2f;
  --accent-hover: #1a1a1a;
  --tag-bg: #f0f0f0;
  --tag-text: #555;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --radius: 8px;
  --radius-sm: 6px;
  --sidebar-w: 240px;
  --insight-w: 280px;
  --header-h: 52px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  --font-mono: "SF Mono", "Cascadia Code", "Consolas", monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
  flex-shrink: 0;
  z-index: 10;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 15px;
  white-space: nowrap;
  color: var(--accent);
  cursor: default;
  user-select: none;
}
.header-logo .logo-icon {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 14px;
  font-weight: 800;
}
.header-search {
  flex: 1;
  position: relative;
}
.header-search input {
  width: 100%;
  height: 34px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0 12px 0 34px;
  font-size: 14px;
  font-family: var(--font);
  background: var(--bg);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.header-search input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(47,47,47,0.08);
}
.header-search .search-icon {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-tertiary);
  font-size: 14px;
  pointer-events: none;
}
.header-actions {
  display: flex;
  gap: 8px;
}
.btn {
  height: 32px;
  padding: 0 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: var(--font);
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.btn:hover { background: var(--bg); border-color: #ccc; }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

/* ── Layout ── */
main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
  padding: 12px 8px;
  gap: 4px;
}
.sidebar-section {
  margin-bottom: 8px;
}
.sidebar-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--text-tertiary);
  padding: 6px 10px 4px;
  letter-spacing: 0.03em;
}
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  cursor: pointer;
  color: var(--text-secondary);
  transition: background 0.1s, color 0.1s;
  user-select: none;
}
.sidebar-item:hover { background: var(--bg); }
.sidebar-item.active { background: #efefef; color: var(--text); font-weight: 500; }
.sidebar-item .count {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-tertiary);
  background: var(--bg);
  padding: 1px 6px;
  border-radius: 10px;
}
.sidebar-item .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Center ── */
.center {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-width: 0;
}

/* Research Question Block */
.question-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
}
.question-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.3;
}
.question-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.tag {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  background: var(--tag-bg);
  border-radius: 20px;
  font-size: 12px;
  color: var(--tag-text);
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}
.tag:hover { background: #e0e0e0; }
.tag.highlight { background: #2f2f2f; color: #fff; }

/* Paper Cards */
.papers-section {}
.papers-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.papers-section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.papers-count {
  font-size: 12px;
  color: var(--text-tertiary);
}
.paper-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.paper-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow-sm);
  transition: border-color 0.15s, box-shadow 0.15s;
  cursor: default;
}
.paper-card:hover {
  border-color: #ccc;
  box-shadow: var(--shadow-md);
}
.paper-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.paper-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  flex: 1;
}
.paper-year {
  font-size: 12px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  flex-shrink: 0;
}
.paper-meta {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.paper-meta span { white-space: nowrap; }
.paper-abstract {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.55;
  margin-top: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.paper-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  gap: 8px;
  flex-wrap: wrap;
}
.paper-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.paper-tag {
  font-size: 11px;
  padding: 2px 8px;
  background: #f4f4f5;
  border-radius: 4px;
  color: var(--text-tertiary);
}
.paper-theory {
  font-size: 11px;
  padding: 2px 8px;
  background: #e8f0fe;
  border-radius: 4px;
  color: #3b5998;
  font-weight: 500;
}
.paper-actions {
  display: flex;
  gap: 4px;
}
.paper-actions .btn {
  height: 28px;
  padding: 0 10px;
  font-size: 12px;
}

/* Topic Categories */
.topics-block {}
.topics-block-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 10px;
}
.topic-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.topic-chip {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  cursor: pointer;
  background: var(--surface);
  color: var(--text-secondary);
  transition: all 0.15s;
  user-select: none;
  box-shadow: var(--shadow-sm);
}
.topic-chip:hover { border-color: #aaa; }
.topic-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Outline Block */
.outline-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  box-shadow: var(--shadow-sm);
}
.outline-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 10px;
}
.outline-tree {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.outline-node {
  font-size: 13px;
  color: var(--text-secondary);
  padding: 4px 8px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.1s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.outline-node:hover { background: var(--bg); }
.outline-node.l1 { font-weight: 600; color: var(--text); padding-left: 0; }
.outline-node.l2 { padding-left: 20px; }
.outline-node.l3 { padding-left: 36px; font-size: 12px; }

/* ── Insights Panel ── */
.insights {
  width: var(--insight-w);
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.insight-section {}
.insight-section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}
.insight-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.insight-item {
  font-size: 13px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text-secondary);
  transition: background 0.1s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.insight-item:hover { background: var(--bg); }
.insight-item .bullet {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  opacity: 0.5;
}
.insight-gap-tag {
  display: inline-block;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  background: #fff3cd;
  color: #856404;
  margin-right: 4px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #ccc; }

/* Empty state / selected paper highlight */
.paper-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

/* ── Research Dashboard (5 cards) ── */
.research-dashboard {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.research-card {
  flex: 1;
  min-width: 160px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  box-shadow: var(--shadow-sm);
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
}
.research-card:hover {
  border-color: #aaa;
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.research-card-icon {
  font-size: 28px;
  margin-bottom: 8px;
}
.research-card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}
.research-card-desc {
  font-size: 11px;
  color: var(--text-tertiary);
}
.research-card.active {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(47,47,47,0.15);
}

/* ── Card Detail Block ── */
.detail-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  box-shadow: var(--shadow-sm);
}
.detail-block-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 10px;
}
.detail-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.detail-item {
  font-size: 13px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: default;
}
.detail-item:hover { background: var(--bg); }
.detail-item .bullet {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  opacity: 0.5;
}
.var-role {
  font-size: 11px;
  color: var(--text-tertiary);
}

/* ── Term Expansion Block ── */
.term-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.term-block-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
}
.term-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  flex: 1;
  min-width: 0;
}
.term-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  background: #e8f0fe;
  border-radius: 20px;
  font-size: 12px;
  color: #3b5998;
  cursor: default;
  user-select: none;
}
.term-tag .term-del {
  cursor: pointer;
  font-size: 14px;
  opacity: 0.5;
  line-height: 1;
}
.term-tag .term-del:hover { opacity: 1; }
.term-block .btn {
  flex-shrink: 0;
}

/* ── Term Modal ── */
.term-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.term-modal {
  background: var(--surface);
  border-radius: 12px;
  padding: 24px 28px;
  width: 420px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
}
.term-modal-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}
.term-modal-desc {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-bottom: 16px;
}
.term-modal input {
  width: 100%;
  height: 38px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 12px;
  font-size: 14px;
  font-family: var(--font);
  outline: none;
  margin-bottom: 16px;
}
.term-modal input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(47,47,47,0.08);
}
.term-modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
.btn-cancel {
  background: var(--bg);
  border: 1px solid var(--border);
}
.btn-cancel:hover { background: var(--border); }
</style>
</head>
<body>

<!-- ═══════════════════════ HEADER ═══════════════════════ -->
<header>
  <div class="header-logo">
    <div class="logo-icon">R</div>
    ResearchOS
  </div>
  <div class="header-search">
    <span class="search-icon">&#9906;</span>
    <input type="text" id="searchInput" placeholder="输入研究问题，如：ESG 对成本粘性的影响...">
  </div>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="handleNewResearch()">+ 新建研究</button>
    <button class="btn" onclick="handleSearch()">&#128269; 搜索</button>
    <button class="btn" onclick="handleImport()">&#10514; 导入</button>
    <button class="btn" onclick="handleExport()">&#10515; 导出</button>
  </div>
</header>

<!-- ═══════════════════════ MAIN ═══════════════════════ -->
<main>
  <!-- ─── SIDEBAR ─── -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">研究主题</div>
      <div id="topicList"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">最近研究</div>
      <div id="recentList"></div>
    </div>
  </aside>

  <!-- ─── CENTER ─── -->
  <section class="center" id="centerArea"></section>
</main>

<script>
// ═══════════════════════ ENTITY DATA MODEL ═══════════════════════
const STORAGE_KEY = 'accounting_research_copilot_v2';

// ── Entity arrays ──
let topics = [];
let papers = [];
let theories = [];
let variables = [];
let methods = [];
let structures = [];
let termExpansions = [];

const nextIds = { topics: 1, papers: 1, theories: 1, variables: 1, methods: 1, structures: 1, termExpansions: 1 };

function nextIdFor(entity) { return nextIds[entity]++; }

// ── Entity getters ──
function getPapers(topicId)       { return papers.filter(p => p.topicId === topicId); }
function getTheories(topicId)     { return theories.filter(t => t.topicId === topicId); }
function getVariables(topicId)    { return variables.filter(v => v.topicId === topicId); }
function getMethods(topicId)      { return methods.filter(m => m.topicId === topicId); }
function getStructures(topicId)   { return structures.filter(s => s.topicId === topicId).sort((a,b) => a.sortOrder - b.sortOrder); }
function getTermExpansions(topicId) { return termExpansions.filter(t => t.topicId === topicId); }

// ── Default seed data ──
function seedDefaultData() {
  const now = Date.now();
  const tid = nextIdFor('topics');
  topics.push({ id: tid, name: "ESG 如何影响成本粘性", createdAt: now, modifiedAt: now });

  const paperData = [
    { title: "ESG Performance and Cost Stickiness: Evidence from Chinese Listed Firms", authors: "Chen, X., Wang, Y., & Li, Z.", journal: "Journal of Corporate Finance", year: 2023, abstract: "This study examines the relationship between ESG performance and cost stickiness using a sample of Chinese A-share listed firms from 2010 to 2021. We find that better ESG performance significantly reduces cost stickiness, and this effect is more pronounced in firms with higher agency costs and weaker external monitoring.", tags: ["ESG", "cost stickiness", "China"], theory: "Agency Theory", topic: "esg" },
    { title: "The Role of ESG Disclosure in Mitigating Asymmetric Cost Behavior", authors: "Wang, L. & Zhang, H.", journal: "Accounting Review", year: 2022, abstract: "We investigate whether ESG disclosure quality affects asymmetric cost behavior. Using a difference-in-differences design around mandatory ESG disclosure regulation, we document that enhanced transparency reduces managerial empire-building incentives, thereby lowering cost stickiness.", tags: ["ESG disclosure", "cost behavior", "transparency"], theory: "Stakeholder Theory", topic: "esg" },
    { title: "Agency Costs, Managerial Expectations, and Cost Stickiness: Theory and Evidence", authors: "Anderson, M., Banker, R., & Janakiraman, S.", journal: "Journal of Accounting and Economics", year: 2003, abstract: "This seminal paper establishes the theory of cost stickiness, demonstrating that SG&A costs increase more when activity rises than they decrease when activity falls by an equivalent amount.", tags: ["cost stickiness", "agency", "foundational"], theory: "Agency Theory", topic: "formation" },
    { title: "Digital Transformation and Cost Structure: Evidence from Manufacturing Firms", authors: "Liu, J., Zhang, K., & Wu, T.", journal: "Management Science", year: 2024, abstract: "This paper explores how digital transformation reshapes firms' cost structures. We find that digital adoption increases cost flexibility and reduces stickiness, especially for labor costs.", tags: ["digital", "cost structure", "manufacturing"], theory: "Resource-Based View", topic: "digital" },
    { title: "Corporate Governance, Board Characteristics, and Cost Stickiness", authors: "Park, S. & Kim, J.", journal: "Asia-Pacific Journal of Financial Studies", year: 2021, abstract: "We examine how corporate governance mechanisms affect cost stickiness in Korean firms. Results show that larger boards and higher board independence are associated with reduced cost stickiness.", tags: ["governance", "board", "Korea"], theory: "Institutional Theory", topic: "governance" },
    { title: "Green Innovation, Resource Adjustment Costs, and Asymmetric Cost Behavior", authors: "Zhang, R., Huang, M., & Park, D.", journal: "Strategic Management Journal", year: 2024, abstract: "This study links green innovation activities to cost behavior. Green innovation creates specialized resources that increase cost stickiness in the short run but reduce it in the long run.", tags: ["green innovation", "cost stickiness", "sustainability"], theory: "Legitimacy Theory", topic: "esg" }
  ];
  paperData.forEach(p => papers.push({ id: nextIdFor('papers'), topicId: tid, ...p }));

  ["Agency Theory", "Stakeholder Theory", "Resource-Based View", "Signaling Theory", "Legitimacy Theory", "Institutional Theory"]
    .forEach(t => theories.push({ id: nextIdFor('theories'), topicId: tid, name: t }));

  [
    { name: "ESG Score", role: "自变量" }, { name: "Cost Stickiness", role: "因变量" },
    { name: "Firm Size", role: "控制变量" }, { name: "Leverage", role: "控制变量" },
    { name: "ROA", role: "控制变量" }, { name: "Board Size", role: "调节变量" }
  ].forEach(v => variables.push({ id: nextIdFor('variables'), topicId: tid, ...v }));

  ["ABJ Model", "Fixed Effects Panel", "2SLS / IV", "Propensity Score Matching", "Difference-in-Differences"]
    .forEach(m => methods.push({ id: nextIdFor('methods'), topicId: tid, name: m }));

  ["Abstract", "Introduction", "Theoretical Framework", "Literature Review", "Research Gaps", "Future Directions", "Conclusion"]
    .forEach((s, i) => structures.push({ id: nextIdFor('structures'), topicId: tid, name: s, sortOrder: i }));

  ["ESG 评级", "成本粘性", "代理成本", "信息不对称", "利益相关者", "调整成本"]
    .forEach(t => termExpansions.push({ id: nextIdFor('termExpansions'), topicId: tid, term: t }));
}

// ── Persistence ──
function saveAll() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    nextIds, topics, papers, theories, variables, methods, structures, termExpansions
  }));
}

function loadAll() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  const d = JSON.parse(raw);
  Object.assign(nextIds, d.nextIds || {});
  topics = d.topics || [];
  papers = d.papers || [];
  theories = d.theories || [];
  variables = d.variables || [];
  methods = d.methods || [];
  structures = d.structures || [];
  termExpansions = d.termExpansions || [];
  return topics.length > 0;
}

// Init data
if (!loadAll()) {
  seedDefaultData();
  saveAll();
}

let selectedTopicId = topics[0] ? topics[0].id : null;
let activeCard = 'papers';

// ═══════════════════════ SIDEBAR ═══════════════════════
function renderSidebar() {
  const topicList = document.getElementById('topicList');
  const recentList = document.getElementById('recentList');

  const byCreation = [...topics].sort((a, b) => a.createdAt - b.createdAt);
  topicList.innerHTML = byCreation.map(t => `
    <div class="sidebar-item${t.id === selectedTopicId ? ' active' : ''}" data-topic-id="${t.id}">
      ${t.name}
    </div>
  `).join('') || '<div class="sidebar-item" style="color:var(--text-tertiary)">暂无研究主题</div>';

  const byModified = [...topics].sort((a, b) => b.modifiedAt - a.modifiedAt).slice(0, 10);
  recentList.innerHTML = byModified.map(t => `
    <div class="sidebar-item${t.id === selectedTopicId ? ' active' : ''}" data-topic-id="${t.id}">
      <span class="dot" style="background:${t.id === selectedTopicId ? 'var(--accent)' : '#ccc'}"></span>
      ${t.name}
    </div>
  `).join('') || '<div class="sidebar-item" style="color:var(--text-tertiary)">暂无最近研究</div>';
}

function getSelectedTopic() {
  return topics.find(t => t.id === selectedTopicId);
}

function selectTopic(id) {
  selectedTopicId = id;
  const topic = getSelectedTopic();
  if (!topic) return;
  topic.modifiedAt = Date.now();
  saveAll();
  document.getElementById('searchInput').value = topic.name;
  renderSidebar();
  renderCenter(topic);
}

// ═══════════════════════ CENTER RENDER ═══════════════════════
const cardDefs = [
  { key: 'papers', icon: '📄', title: '已有文献', desc: '浏览与主题相关的学术论文' },
  { key: 'theories', icon: '📚', title: '理论列表', desc: '相关理论框架与视角' },
  { key: 'variables', icon: '📊', title: '变量列表', desc: '自变量、因变量、控制变量等' },
  { key: 'methods', icon: '🔬', title: '常用方法', desc: '实证方法与研究设计' },
  { key: 'structure', icon: '📝', title: '综述结构', desc: '文献综述的组织框架' }
];

function renderCenter(topic) {
  const center = document.getElementById('centerArea');
  const tid = topic.id;
  const topicPapers = getPapers(tid);
  const tags = topicPapers.slice(0, 4).map(p => p.tags[0]).filter((v, i, a) => a.indexOf(v) === i);
  const topicTerms = getTermExpansions(tid);

  let papersHtml = '';
  let detailHtml = '';

  if (!activeCard) {
    papersHtml = `<div class="paper-list" id="paperList"></div>`;
  } else {
    detailHtml = renderCardDetail(tid);
  }

  center.innerHTML = `
    <div class="question-block">
      <div class="question-title">${topic.name}</div>
      <div class="question-tags" id="questionTags">
        ${tags.map((t, i) => `<span class="tag${i===0?' highlight':''}">${t}</span>`).join('')}
      </div>
    </div>
    <div class="term-block" id="termBlock">
      <span class="term-block-label">术语拓展</span>
      <div class="term-tags" id="termTags">
        ${topicTerms.map(t => `
          <span class="term-tag">${t.term}<span class="term-del" data-id="${t.id}">&times;</span></span>
        `).join('')}
      </div>
      <button class="btn" id="btnAddTerm">+ 新建</button>
      <button class="btn" id="btnAiExpand" title="AI 智能拓展术语">&#10025; AI 拓展</button>
    </div>
    <div class="research-dashboard" id="researchDashboard">
      ${cardDefs.map(c => `
        <div class="research-card${activeCard === c.key ? ' active' : ''}" data-card="${c.key}">
          <div class="research-card-icon">${c.icon}</div>
          <div class="research-card-title">${c.title}</div>
          <div class="research-card-desc">${c.desc}</div>
        </div>
      `).join('')}
    </div>
    <div id="cardDetailArea">${detailHtml}</div>
    ${papersHtml}
  `;

  renderPapers(topicPapers);

  document.getElementById('researchDashboard').addEventListener('click', function(e) {
    const card = e.target.closest('.research-card');
    if (!card) return;
    const key = card.dataset.card;
    activeCard = (activeCard === key) ? null : key;
    renderCenter(getSelectedTopic());
  });

  document.getElementById('btnAddTerm').addEventListener('click', function() {
    showTermModal(function(term) {
      const t = getSelectedTopic();
      termExpansions.push({ id: nextIdFor('termExpansions'), topicId: t.id, term });
      t.modifiedAt = Date.now();
      saveAll();
      renderCenter(t);
    });
  });
  document.getElementById('btnAiExpand').addEventListener('click', function() {
    alert('AI 拓展功能开发中');
  });
  document.getElementById('termTags').addEventListener('click', function(e) {
    const del = e.target.closest('.term-del');
    if (!del) return;
    const id = parseInt(del.dataset.id);
    termExpansions = termExpansions.filter(x => x.id !== id);
    const t = getSelectedTopic();
    t.modifiedAt = Date.now();
    saveAll();
    renderCenter(t);
  });

  rebindOutlineEvents();
}

function renderPapers(papersList) {
  const container = document.getElementById('paperList');
  if (!container) return;
  container.innerHTML = papersList.map(p => `
    <div class="paper-card" data-id="${p.id}">
      <div class="paper-card-header">
        <div class="paper-title">${p.title}</div>
        <div class="paper-year">${p.year}</div>
      </div>
      <div class="paper-meta">
        <span>${p.authors}</span>
        <span style="font-weight:500">${p.journal}</span>
      </div>
      <div class="paper-abstract">${p.abstract}</div>
      <div class="paper-card-footer">
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
          <div class="paper-tags">
            ${p.tags.map(t => `<span class="paper-tag">${t}</span>`).join('')}
          </div>
          <span class="paper-theory">${p.theory}</span>
        </div>
        <div class="paper-actions">
          <button class="btn" title="查看详情">详情</button>
          <button class="btn" title="保存">保存</button>
        </div>
      </div>
    </div>
  `).join('');

  container.querySelectorAll('.paper-card').forEach(card => {
    card.addEventListener('click', function() {
      container.querySelectorAll('.paper-card').forEach(c => c.classList.remove('selected'));
      this.classList.add('selected');
    });
  });
}

function renderCardDetail(tid) {
  switch (activeCard) {
    case 'papers':
      return `
        <div class="detail-block">
          <div class="detail-block-title">已有文献</div>
          <div class="paper-list" id="paperList"></div>
        </div>`;
    case 'theories':
      return `
        <div class="detail-block">
          <div class="detail-block-title">理论列表</div>
          <div class="detail-list">
            ${getTheories(tid).map(t => `<div class="detail-item"><span class="bullet"></span> ${t.name}</div>`).join('')}
          </div>
        </div>`;
    case 'variables':
      return `
        <div class="detail-block">
          <div class="detail-block-title">变量列表</div>
          <div class="detail-list">
            ${getVariables(tid).map(v => `<div class="detail-item"><span class="bullet"></span> ${v.name} <span class="var-role">(${v.role})</span></div>`).join('')}
          </div>
        </div>`;
    case 'methods':
      return `
        <div class="detail-block">
          <div class="detail-block-title">常用方法</div>
          <div class="detail-list">
            ${getMethods(tid).map(m => `<div class="detail-item"><span class="bullet"></span> ${m.name}</div>`).join('')}
          </div>
        </div>`;
    case 'structure':
      return `
        <div class="detail-block">
          <div class="detail-block-title">综述结构</div>
          <div class="detail-list">
            ${getStructures(tid).map(s => `<div class="detail-item"><span class="bullet"></span> ${s.sortOrder + 1}. ${s.name}</div>`).join('')}
          </div>
        </div>`;
    default:
      return '';
  }
}

function showTermModal(onSave) {
  const overlay = document.createElement('div');
  overlay.className = 'term-modal-overlay';
  overlay.innerHTML = `
    <div class="term-modal">
      <div class="term-modal-title">添加术语</div>
      <div class="term-modal-desc">输入与当前研究主题相关的学术术语，帮助拓展研究视野</div>
      <input type="text" id="termModalInput" placeholder="例如：信息不对称、代理成本、调整成本..." autofocus>
      <div class="term-modal-actions">
        <button class="btn btn-cancel" id="termModalCancel">取消</button>
        <button class="btn btn-primary" id="termModalSave">保存</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const input = overlay.querySelector('#termModalInput');
  const close = () => overlay.remove();

  overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
  overlay.querySelector('#termModalCancel').addEventListener('click', close);
  overlay.querySelector('#termModalSave').addEventListener('click', function() {
    const val = input.value.trim();
    if (!val) { input.focus(); return; }
    onSave(val);
    close();
  });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const val = input.value.trim();
      if (!val) return;
      onSave(val);
      close();
    } else if (e.key === 'Escape') {
      close();
    }
  });
  input.focus();
}

function rebindOutlineEvents() {
  const outlineEl = document.querySelector('.outline-tree');
  if (outlineEl) {
    outlineEl.addEventListener('click', function(e) {
      const node = e.target.closest('.outline-node');
      if (!node) return;
      this.querySelectorAll('.outline-node').forEach(n => { n.style.color = ''; n.style.fontWeight = ''; });
      node.style.color = 'var(--text)';
      node.style.fontWeight = '600';
    });
  }
}

// ═══════════════════════ HEADER BUTTONS ═══════════════════════
function handleSearch() { alert('实现中'); }

function handleNewResearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { alert('请输入研究主题'); return; }

  const existing = topics.find(t => t.name === q);
  if (existing) { selectTopic(existing.id); return; }

  const tid = nextIdFor('topics');
  const now = Date.now();
  topics.push({ id: tid, name: q, createdAt: now, modifiedAt: now });
  ["Abstract", "Introduction", "Theoretical Framework", "Literature Review", "Research Gaps", "Future Directions", "Conclusion"]
    .forEach((s, i) => structures.push({ id: nextIdFor('structures'), topicId: tid, name: s, sortOrder: i }));
  saveAll();
  activeCard = 'papers';
  selectTopic(tid);
}

function handleExport() {
  const data = JSON.stringify({ nextIds, topics, papers, theories, variables, methods, structures, termExpansions }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `research_data_${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function handleImport() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const d = JSON.parse(ev.target.result);
        if (!d.topics || !Array.isArray(d.topics)) { alert('文件格式不正确'); return; }
        Object.assign(nextIds, d.nextIds || {});
        topics = d.topics || [];
        papers = d.papers || [];
        theories = d.theories || [];
        variables = d.variables || [];
        methods = d.methods || [];
        structures = d.structures || [];
        termExpansions = d.termExpansions || [];
        saveAll();
        selectedTopicId = topics[0] ? topics[0].id : null;
        activeCard = 'papers';
        renderSidebar();
        renderCenter(getSelectedTopic());
      } catch (err) {
        alert('文件解析失败：' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ═══════════════════════ SIDEBAR & SEARCH ═══════════════════════
document.querySelector('.sidebar').addEventListener('click', function(e) {
  const item = e.target.closest('.sidebar-item');
  if (!item) return;
  const id = parseInt(item.dataset.topicId);
  if (!id) return;
  activeCard = 'papers';
  selectTopic(id);
});

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleSearch();
});

// ═══════════════════════ INIT ═══════════════════════
if (topics.length > 0) selectedTopicId = topics[0].id;
renderSidebar();
renderCenter(getSelectedTopic());
</script>
